<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Dark background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <!-- Gold shield face -->
    <linearGradient id="shield-face" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#f5c542"/>
      <stop offset="30%" stop-color="#e8a817"/>
      <stop offset="60%" stop-color="#d4940f"/>
      <stop offset="100%" stop-color="#c07b0a"/>
    </linearGradient>
    <!-- Gold outer rim -->
    <linearGradient id="gold-rim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="40%" stop-color="#d4940f"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <!-- Green border -->
    <linearGradient id="green-rim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="30%" stop-color="#16a34a"/>
      <stop offset="70%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
    <!-- Claw red gradient -->
    <linearGradient id="claw-red" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="50%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <!-- Claw dark shading -->
    <linearGradient id="claw-dark" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
    <!-- Shield inner sheen -->
    <radialGradient id="shield-sheen" cx="40%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#b45309" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="72" fill="url(#bg)"/>

  <!-- Shield gold outer rim -->
  <path d="M256 62 L424 135 L424 280 Q424 392 256 458 Q88 392 88 280 L88 135 Z"
        fill="url(#gold-rim)" stroke="#92400e" stroke-width="1.5"/>

  <!-- Shield green border -->
  <path d="M256 76 L412 144 L412 276 Q412 382 256 444 Q100 382 100 276 L100 144 Z"
        fill="url(#green-rim)" stroke="#15803d" stroke-width="1"/>

  <!-- Shield gold face (inside green) -->
  <path d="M256 92 L396 156 L396 270 Q396 368 256 428 Q116 368 116 270 L116 156 Z"
        fill="url(#shield-face)"/>

  <!-- Shield inner sheen -->
  <path d="M256 92 L396 156 L396 270 Q396 368 256 428 Q116 368 116 270 L116 156 Z"
        fill="url(#shield-sheen)"/>

  <!-- Gold rivets on green border -->
  <circle cx="256" cy="76" r="5" fill="#fde68a" opacity="0.85"/>
  <circle cx="180" cy="102" r="4.5" fill="#fde68a" opacity="0.8"/>
  <circle cx="332" cy="102" r="4.5" fill="#fde68a" opacity="0.8"/>
  <circle cx="136" cy="148" r="4.5" fill="#fde68a" opacity="0.75"/>
  <circle cx="376" cy="148" r="4.5" fill="#fde68a" opacity="0.75"/>
  <circle cx="108" cy="200" r="4.5" fill="#fde68a" opacity="0.7"/>
  <circle cx="404" cy="200" r="4.5" fill="#fde68a" opacity="0.7"/>
  <circle cx="102" cy="256" r="4.5" fill="#fde68a" opacity="0.7"/>
  <circle cx="410" cy="256" r="4.5" fill="#fde68a" opacity="0.7"/>
  <circle cx="112" cy="310" r="4.5" fill="#fde68a" opacity="0.65"/>
  <circle cx="400" cy="310" r="4.5" fill="#fde68a" opacity="0.65"/>
  <circle cx="140" cy="358" r="4.5" fill="#fde68a" opacity="0.6"/>
  <circle cx="372" cy="358" r="4.5" fill="#fde68a" opacity="0.6"/>
  <circle cx="185" cy="398" r="4.5" fill="#fde68a" opacity="0.55"/>
  <circle cx="327" cy="398" r="4.5" fill="#fde68a" opacity="0.55"/>
  <circle cx="256" cy="424" r="4.5" fill="#fde68a" opacity="0.5"/>

  <!-- === LEFT UPPER CLAW === -->
  <!-- Main arm curving up-left with open pincer -->
  <path d="
    M 220 268
    Q 195 255 175 230
    Q 155 200 150 170
    Q 146 145 158 128
    Q 170 112 188 118
    Q 200 122 208 138
    Q 218 158 212 178
    Q 206 195 210 210
    L 220 268 Z
  " fill="url(#claw-red)" stroke="#7f1d1d" stroke-width="2"/>
  <!-- Left claw upper tip -->
  <path d="
    M 158 128
    Q 142 108 128 112
    Q 115 118 118 134
    Q 122 148 138 152
    Q 150 154 158 145
    Q 165 136 158 128 Z
  " fill="url(#claw-red)" stroke="#7f1d1d" stroke-width="1.8"/>
  <!-- Left claw lower tip -->
  <path d="
    M 188 118
    Q 178 102 166 104
    Q 156 108 158 120
    Q 160 130 170 132
    Q 180 134 188 126
    Z
  " fill="url(#claw-dark)" stroke="#7f1d1d" stroke-width="1.5"/>
  <!-- Left claw gap/slit -->
  <path d="M 160 128 Q 168 118 176 120" fill="none" stroke="#7f1d1d" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left claw highlight -->
  <path d="M 165 175 Q 160 155 168 138" fill="none" stroke="#fca5a5" stroke-width="2" opacity="0.4" stroke-linecap="round"/>

  <!-- === RIGHT UPPER CLAW (mirrored) === -->
  <path d="
    M 292 268
    Q 317 255 337 230
    Q 357 200 362 170
    Q 366 145 354 128
    Q 342 112 324 118
    Q 312 122 304 138
    Q 294 158 300 178
    Q 306 195 302 210
    L 292 268 Z
  " fill="url(#claw-red)" stroke="#7f1d1d" stroke-width="2"/>
  <!-- Right claw upper tip -->
  <path d="
    M 354 128
    Q 370 108 384 112
    Q 397 118 394 134
    Q 390 148 374 152
    Q 362 154 354 145
    Q 347 136 354 128 Z
  " fill="url(#claw-red)" stroke="#7f1d1d" stroke-width="1.8"/>
  <!-- Right claw lower tip -->
  <path d="
    M 324 118
    Q 334 102 346 104
    Q 356 108 354 120
    Q 352 130 342 132
    Q 332 134 324 126
    Z
  " fill="url(#claw-dark)" stroke="#7f1d1d" stroke-width="1.5"/>
  <!-- Right claw gap/slit -->
  <path d="M 352 128 Q 344 118 336 120" fill="none" stroke="#7f1d1d" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right claw highlight -->
  <path d="M 347 175 Q 352 155 344 138" fill="none" stroke="#fca5a5" stroke-width="2" opacity="0.4" stroke-linecap="round"/>

  <!-- === BOTTOM CENTER CLAW (smaller, pointing down) === -->
  <!-- Left half of bottom claw -->
  <path d="
    M 256 295
    Q 240 298 228 315
    Q 218 332 222 352
    Q 226 365 236 372
    Q 245 376 252 368
    Q 256 358 254 345
    Q 252 330 256 318
    Z
  " fill="url(#claw-red)" stroke="#7f1d1d" stroke-width="2"/>
  <!-- Right half of bottom claw -->
  <path d="
    M 256 295
    Q 272 298 284 315
    Q 294 332 290 352
    Q 286 365 276 372
    Q 267 376 260 368
    Q 256 358 258 345
    Q 260 330 256 318
    Z
  " fill="url(#claw-red)" stroke="#7f1d1d" stroke-width="2"/>
  <!-- Bottom claw left tip -->
  <path d="
    M 236 372
    Q 230 385 234 394
    Q 240 400 248 396
    Q 253 390 252 380
    Q 250 374 244 372 Z
  " fill="url(#claw-dark)" stroke="#7f1d1d" stroke-width="1.5"/>
  <!-- Bottom claw right tip -->
  <path d="
    M 276 372
    Q 282 385 278 394
    Q 272 400 264 396
    Q 259 390 260 380
    Q 262 374 268 372 Z
  " fill="url(#claw-dark)" stroke="#7f1d1d" stroke-width="1.5"/>
  <!-- Bottom claw gap -->
  <path d="M 248 378 Q 256 370 264 378" fill="none" stroke="#7f1d1d" stroke-width="2" stroke-linecap="round"/>
  <!-- Bottom claw highlight -->
  <path d="M 240 330 Q 238 345 242 358" fill="none" stroke="#fca5a5" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>

  <!-- Central joint connecting claws to body -->
  <ellipse cx="256" cy="282" rx="42" ry="16"
           fill="#b91c1c" stroke="#7f1d1d" stroke-width="1.5" opacity="0.7"/>
</svg>
