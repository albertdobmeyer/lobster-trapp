# Lobster-Trapp — service orchestration
# Composes all component layers into a unified local stack.
#
# Usage:
#   docker compose up
#
# Runtime security model (onion/concentric):
#   Lobster-TrApp (GUI + orchestration, outermost)
#     └── OpenClaw-Vault (hardened container = passive defense)
#           └── ClawHub-Forge (skill scanning = active defense)
#                 └── MoltBook-Pioneer (agent in the wild, innermost)
#
# Each inner layer is progressively more isolated.
# Services will be added here as components are containerized.

