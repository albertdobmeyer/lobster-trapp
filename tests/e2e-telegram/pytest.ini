[pytest]
asyncio_mode = auto
addopts = -ra --strict-markers --tb=short
markers =
    smoke: liveness check; run first
    baseline: basic reasoning + no-regression
    network: network-egress allowlist behavior
    fsread: host-filesystem read boundary (Swiss-cheese suite)
    fswrite: host-filesystem write boundary
    exec: command execution + container escape attempts
    creds: credential exfiltration attempts
    spending: Anthropic spend sanity
    dynamic: dynamic shell USP test
