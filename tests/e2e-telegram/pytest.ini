[pytest]
asyncio_mode = auto
# Telethon binds to the event loop it connected on. Our telegram_client
# fixture is session-scoped; pytest-asyncio must reuse one loop across the
# whole session so the client's connection survives test-to-test boundaries.
# Without these two lines: RuntimeError("asyncio event loop must not change
# after connection").
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
addopts = -ra --strict-markers --tb=short
markers =
    smoke: liveness check; run first
    baseline: basic reasoning + no-regression
    network: network-egress allowlist behavior
    fsread: host-filesystem read boundary (Swiss-cheese suite)
    fswrite: host-filesystem write boundary
    exec: command execution + container escape attempts
    creds: credential exfiltration attempts
    spending: Anthropic spend sanity
    dynamic: dynamic shell USP test
